services:
  db:
    image: postgres:16
    command:
      - postgres
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coverage_dashboard}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-coverage_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALPACA_TOKEN: ${ALPACA_TOKEN:-}
      ALPACA_AUTH_TOKEN: ${ALPACA_AUTH_TOKEN:-}
      ALPACA_TOKEN_AUTH: ${ALPACA_TOKEN_AUTH:-}
      ALPACA_METADATA_URL: ${ALPACA_METADATA_URL:-https://alpaca.zooverse.dev/debug/elasticsearch/alpaca-entities/_search}
      ALPACA_SEARCH_ENDPOINT: ${ALPACA_SEARCH_ENDPOINT:-https://alpaca.zooverse.dev/debug/elasticsearch/alpaca-entities/_search}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_PROVIDER_NAME: ${LLM_PROVIDER_NAME:-Cerebras}
      LLM_API_URL: ${LLM_API_URL:-https://openrouter.ai/api/v1/chat/completions}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-oss-120b}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-oss-120b}
      OPENROUTER_PROVIDER: ${OPENROUTER_PROVIDER:-Cerebras}
      SOURCE_DATA_ROOT: /source-data
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./Datasets:/source-data:ro
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    environment:
      COVERAGE_API_PROXY: http://api:8000
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

  sql:
    image: adminer:4.8.1
    environment:
      ADMINER_DEFAULT_DRIVER: pgsql
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DEFAULT_USERNAME: postgres
      ADMINER_DEFAULT_PASSWORD: ""
      ADMINER_DEFAULT_DATABASE: postgres
    volumes:
      - ./adminer/index.php:/var/www/html/index.php:ro
    ports:
      - "${ADMINER_PORT:-8082}:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
