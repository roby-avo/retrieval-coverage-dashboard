services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALPACA_TOKEN: ${ALPACA_TOKEN:-}
      ALPACA_AUTH_TOKEN: ${ALPACA_AUTH_TOKEN:-}
      ALPACA_TOKEN_AUTH: ${ALPACA_TOKEN_AUTH:-}
      ALPACA_METADATA_URL: ${ALPACA_METADATA_URL:-https://alpaca.zooverse.dev/debug/elasticsearch/alpaca-entities/_search}
      ALPACA_SEARCH_ENDPOINT: ${ALPACA_SEARCH_ENDPOINT:-https://alpaca.zooverse.dev/debug/elasticsearch/alpaca-entities/_search}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-oss-120b}
      OPENROUTER_PROVIDER: ${OPENROUTER_PROVIDER:-Cerebras}
      SOURCE_DATA_ROOT: /source-data
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./Datasets:/source-data:ro
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    environment:
      COVERAGE_API_PROXY: http://api:8000
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

  sql:
    image: sosedoff/pgweb:0.16.2
    command:
      - pgweb
      - --bind=0.0.0.0
      - --listen=8081
      - --url=postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?sslmode=disable
    ports:
      - "${ADMINER_PORT:-8082}:8081"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
