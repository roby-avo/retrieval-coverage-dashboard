services:
  db:
    image: postgres:16
    command:
      - postgres
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coverage_dashboard}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-coverage_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALPACA_TOKEN: ${ALPACA_TOKEN:-}
      ALPACA_METADATA_URL: ${ALPACA_METADATA_URL:-https://alpaca.zooverse.dev/debug/elasticsearch/alpaca-entities/_search}
      SOURCE_DATA_ROOT: /source-data
    volumes:
      - ./Datasets:/source-data:ro
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api

volumes:
  postgres_prod_data:
